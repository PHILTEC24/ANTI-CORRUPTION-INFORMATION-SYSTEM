<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ACIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .auth-wrap {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 0.85fr 1.15fr;
  }

  .auth-aside {
    background: var(--color-navy-900);
    color: var(--color-white);
    padding: 48px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .auth-aside::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 22px 22px;
  }

  .auth-aside > * {
    position: relative;
  }

  .auth-aside .brand {
    color: var(--color-white);
  }

  .auth-quote {
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 600;
    line-height: 1.35;
    max-width: 34ch;
  }

  .ledger-mini {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-md);
    padding: 18px;
  }

  .ledger-mini-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    font-size: 0.85rem;
  }

  .ledger-mini-row:last-child {
    border-bottom: none;
  }

  .ledger-mini-row span:first-child {
    color: var(--color-slate-200);
  }

  .auth-main {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .auth-form-card {
    width: 100%;
    max-width: 420px;
  }

  .auth-form-card h1 {
    font-size: 1.6rem;
    margin-bottom: 6px;
  }

  .auth-form-card > p {
    margin-bottom: 28px;
  }

  .auth-switch {
    text-align: center;
    font-size: 0.9rem;
    color: var(--color-slate-600);
    margin-top: 20px;
  }

  .auth-switch a {
    font-weight: 600;
  }

  .field-inline-link {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .field-inline-link a {
    font-size: 0.82rem;
    font-weight: 600;
  }

  @media (max-width: 900px) {
    .auth-wrap {
      grid-template-columns: 1fr;
    }
    .auth-aside {
      display: none;
    }
  }
</style>
</head>
<body>

<div class="auth-wrap">

  <aside class="auth-aside">
    <a href="index.html" class="brand">
      <span class="brand-seal">AC</span>
      ACIS
    </a>
    <p class="auth-quote">"Transparency is not a feature. It's the entire point."</p>
    <div class="ledger-mini">
      <div class="ledger-mini-row">
        <span>Reports filed this week</span>
        <span style="font-family:var(--font-mono); color:var(--color-gold-500);">Live</span>
      </div>
      <div class="ledger-mini-row">
        <span>Average time to review</span>
        <span style="font-family:var(--font-mono);">Tracked</span>
      </div>
      <div class="ledger-mini-row">
        <span>Cases resolved</span>
        <span style="font-family:var(--font-mono);">Public</span>
      </div>
    </div>
  </aside>

  <main class="auth-main">
    <div class="auth-form-card">
      <h1>Welcome back</h1>
      <p>Log in to your ACIS account.</p>

      <div class="alert alert-error" id="formAlert"></div>

      <form id="loginForm" novalidate>
        <div class="field" id="field-email">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
          <div class="field-error">Please enter a valid email.</div>
        </div>

        <div class="field password-field" id="field-password">
          <div class="field-inline-link">
            <label for="password">Password</label>
          </div>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
          <button type="button" class="password-toggle" id="togglePassword">Show</button>
          <div class="field-error">Please enter your password.</div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Log in</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>
  const form = document.getElementById("loginForm");
  const formAlert = document.getElementById("formAlert");
  const loginBtn = document.getElementById("loginBtn");

  setupPasswordToggle("password", "togglePassword");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideAlert(formAlert);
    clearFieldError(document.getElementById("field-email"));
    clearFieldError(document.getElementById("field-password"));

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    let hasError = false;
    if (!isValidEmail(email)) {
      setFieldError(document.getElementById("field-email"), "Please enter a valid email.");
      hasError = true;
    }
    if (!password) {
      setFieldError(document.getElementById("field-password"), "Please enter your password.");
      hasError = true;
    }
    if (hasError) return;

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";

    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        loginBtn.disabled = false;
        loginBtn.textContent = "Log in";
        showAlert(formAlert, error.message);
        return;
      }

      const profile = await getProfile(data.user.id);

      loginBtn.disabled = false;
      loginBtn.textContent = "Log in";

      if (profile && profile.role === "admin") {
        goTo("admin-dashboard.html");
      } else {
        goTo("citizen-dashboard.html");
      }
    } catch (err) {
      loginBtn.disabled = false;
      loginBtn.textContent = "Log in";
      showAlert(formAlert, err.message || "An unexpected error occurred during login.");
    }
  });
</script>
</body>
</html>
